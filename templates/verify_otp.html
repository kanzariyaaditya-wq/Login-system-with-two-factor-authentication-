{% extends "base.html" %}
{% block content %}
<h2>OTP Verification</h2>

<div style="text-align:center; color:#7dd3fc; margin-bottom:15px; font-weight:bold; font-size:16px;">
    OTP expires in: <span id="timer">05:00</span>
</div>

{% if demo_otp %}
<div class="otp-box">Your OTP: {{ demo_otp }}</div>
{% endif %}

<form method="POST">
    <input type="text" name="otp" placeholder="Enter 6-digit OTP" required>
    <button type="submit" id="verifyBtn">Verify OTP</button>
</form>

<script>
let timeLeft = 5 * 60;

const timer = document.getElementById("timer");
const verifyBtn = document.getElementById("verifyBtn");

const countdown = setInterval(function () {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    timer.innerHTML =
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");

    if (timeLeft <= 0) {
        clearInterval(countdown);
        timer.innerHTML = "Expired";
        timer.style.color = "#f87171";
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = "OTP Expired";
        verifyBtn.style.opacity = "0.7";
        verifyBtn.style.cursor = "not-allowed";
    }

    timeLeft--;
}, 1000);
</script>
{% endblock %}
